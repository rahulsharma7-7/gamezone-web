<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>🎮 GameZone</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Games</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Buy & Download Your Favorite Games</h2>
        <p>Best collection of PC games at affordable price</p>
    </section>

    <!-- Games Section -->
    <section class="games">

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>GTA V</h3>
            <p>₹999</p>
            <button onclick="buyGame('GTA V')">Buy</button>
            <button onclick="downloadGame('GTA V')">Download</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Call of Duty</h3>
            <p>₹1499</p>
            <button onclick="buyGame('COD')">Buy</button>
            <button onclick="downloadGame('COD')">Download</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Minecraft</h3>
            <p>₹499</p>
            <button onclick="buyGame('Minecraft')">Buy</button>
            <button onclick="downloadGame('Minecraft')">Download</button>
        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 GameZone | Made by Rahul Sharma</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
